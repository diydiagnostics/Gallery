<!DOCTYPE html>
<html>
<head>
  <title>Website Gallery</title>
  <style>
    body { font-family: sans-serif; display: flex; flex-wrap: wrap; gap: 20px; }
    .site-card { width: 300px; border: 1px solid #ccc; border-radius: 10px; overflow: hidden; text-align: center; }
    iframe { width: 300px; height: 400px; border: none; }
    a { display: block; padding: 5px; text-decoration: none; color: #0077cc; }
  </style>
</head>
<body>

<script> 
const sites = [
  { name: "Break or Sprain?", url: "https://shreyaraja.github.io/BreakorSprain/" },
  { name: "Migraine or Headache?", url: "https://noora-5643.github.io/App4-Base_Code/" },
  { name: "Friendship Check-In", url: "https://amaris-0113.github.io/App4-Base_Code/" }
];

sites.forEach(site => {
  document.body.innerHTML += `
    <div class="site-card">
      <iframe src="${site.url}"></iframe>
      <a href="${site.url}" target="_blank">${site.name}</a>
    </div>
  `;
}); 
</script>
<p>Gallery of DIY 2025 diagnostic apps.</p>
</body>
</html>
