<!DOCTYPE html>
<html>
<head>
  <title>Website Gallery</title>
  <style>
    body { font-family: sans-serif; display: flex; flex-wrap: wrap; gap: 20px; }
    .site-card { width: 300px; border: 1px solid #ccc; border-radius: 10px; overflow: hidden; text-align: center; background-color:white;}
    iframe { width: 300px; height: 400px; border: none; }
    a { display: block; padding: 5px; text-decoration: none; color: #0077cc; }
  </style>
</head>
<body style="background-color:black; color: white;">
  
<script> 
async function loadSites() {
  const res = await fetch("sites.txt");
  const text = await res.text();

  const sites = text
    .split("\n")
    .map(line => line.trim())
    .filter(line => line.length > 0)
    .map(url => {
      // Auto-generate a name from the URL
      const name = url
        .replace("https://", "")
        .replace("http://", "")
        .split("/")[0];
      return { name, url };
    });

  sites.forEach(site => {
    document.body.innerHTML += `
      <div class="site-card"><center>
        <iframe src="${site.url}"></iframe>
        <a href="${site.url}" target="_blank">${site.name}</a>
      </center></div>
    `;
  });
}

loadSites();
</script>
<p>
  Gallery of DIY 2025 diagnostic apps.</p>
</body>
</html>
